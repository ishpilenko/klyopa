parameters:
    app.supported_locales: 'en|ru|uk|de|es|fr|pt'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Enum/'
            - '../src/Kernel.php'

    # SiteContext is request-scoped — reset between requests in long-running processes
    App\Service\SiteContext:
        public: true

    # SiteResolverSubscriber needs high priority
    App\EventSubscriber\SiteResolverSubscriber:
        tags:
            - { name: kernel.event_subscriber }

    App\Service\MediaManager:
        arguments:
            $uploadsDir: '%kernel.project_dir%/public/uploads'

    App\EventSubscriber\PageCacheSubscriber:
        arguments:
            $appEnv: '%kernel.environment%'

    App\Command\GenerateCoinDescriptionsCommand:
        arguments:
            $anthropicApiKey: '%env(default::ANTHROPIC_API_KEY)%'

    App\Service\TurnstileVerifier:
        arguments:
            $secretKey: '%env(default::TURNSTILE_SECRET_KEY)%'
            $enabled:   '%env(bool:CAPTCHA_ENABLED)%'

    App\Service\Newsletter\DigestGenerator:
        arguments:
            $anthropicApiKey: '%env(default::ANTHROPIC_API_KEY)%'
