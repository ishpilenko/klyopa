security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        admin_users:
            memory:
                users:
                    admin:
                        # Generate with: bin/console security:hash-password
                        # Default dev password: admin
                        password: '%env(ADMIN_PASSWORD_HASH)%'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api/
            stateless: true
            custom_authenticators:
                - App\Security\ApiTokenAuthenticator

        main:
            lazy: true
            provider: admin_users
            http_basic:
                realm: 'MultiSite Admin'

    access_control:
        - { path: ^/api/, roles: IS_AUTHENTICATED_FULLY }

# In dev — no authentication required for admin
when@dev:
    security:
        firewalls:
            main:
                security: false
