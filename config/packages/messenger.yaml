framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            newsletter:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: newsletter
                retry_strategy:
                    max_retries: 2
                    delay: 5000
                    multiplier: 3
            failed:
                dsn: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\ContentGenerationMessage: async
            App\Message\SendNewsletterMessage: newsletter
