; Custom PHP configuration for multisite platform

[PHP]
display_errors = ${PHP_DISPLAY_ERRORS:-0}
display_startup_errors = 0
error_reporting = E_ALL
log_errors = 1
error_log = /var/log/php/error.log

memory_limit = 256M
max_execution_time = 60
max_input_time = 60
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 10

default_charset = UTF-8
date.timezone = UTC

; OPcache
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = ${OPCACHE_VALIDATE_TIMESTAMPS:-1}
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; Xdebug (configured via XDEBUG_MODE environment variable)
[xdebug]
xdebug.mode = ${XDEBUG_MODE:-off}
xdebug.start_with_request = yes
xdebug.log = /tmp/xdebug.log
