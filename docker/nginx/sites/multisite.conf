# Multisite virtual host — handles all domains
# Each domain resolves to the same PHP app; SiteResolverSubscriber
# identifies the site by the Host header.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/multisite_access.log;
    error_log  /var/log/nginx/multisite_error.log;

    # Static assets — serve directly, long cache
    location ~* \.(jpg|jpeg|png|webp|gif|ico|svg|css|js|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Robots.txt and sitemap.xml — pass to PHP
    location ~ ^/(robots\.txt|sitemap.*\.xml)$ {
        try_files $uri /index.php$is_args$args;
    }

    # Main PHP routing
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        internal;
    }

    # Deny access to .php files other than index.php
    location ~ \.php$ {
        return 404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Deny access to sensitive directories
    location ~* /(config|src|tests|var|vendor)/ {
        deny all;
    }
}
